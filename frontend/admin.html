<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="styleadmin.css">
</head>

<body>

    <h1>Admin Panel</h1>

    <input id="admin_pass" class="admin_password" type="password" placeholder="Admin password">
    <button class="login_admin_btn" onclick="loginAdmin()">Login</button>


    <div id="admin_content" style="display:none;">
        <hr>

        <h2>Pending users</h2>
        <ul id="list"></ul>

        <hr>

        <h2>Users</h2>
        <ul id="approved_list"></ul>
    </div>

    <script>

        window.addEventListener("beforeunload", async () => {
            navigator.sendBeacon("/admin/logout");
        });
        async function loginAdmin() {
            const password = document.getElementById("admin_pass").value;

            const res = await fetch("/admin/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ password })
            });

            const data = await res.json();
            alert(data.message || data.error);

            if (res.ok) {
                document.getElementById("admin_content").style.display = "block";
                await loadPending();
                await loadApproved();
            }
        }

        async function loadPending() {
            const res = await fetch("/admin/pending");
            const users = await res.json();

            const list = document.getElementById("list");
            list.innerHTML = "";

            users.forEach(u => {
                const li = document.createElement("li");
                li.classList.add("users");

                li.innerHTML = `
                    <span class="username">${u}</span>
                <div class="actions">
                    <button class="oui" onclick="approve('${u}')">✔</button>
                    <button class="non" onclick="reject('${u}')">❌</button>
                </div>
`;

                list.appendChild(li);
            });
        }

        async function approve(username) {
            await fetch("/admin/approve", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username })
            });

            loadPending();
        }

        async function reject(username) {
            await fetch("/admin/reject", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username })
            });

            loadPending();
        }

        async function test() {
            const res = await fetch("/debug/approved");
            console.log(await res.json());
        }
        test();

        async function loadApproved() {
            const res = await fetch("/admin/approved");


            const users = await res.json();

            console.log(users);

            const list = document.getElementById("approved_list");
            list.innerHTML = "";

            users.forEach(u => {
                const li = document.createElement("li");

                li.innerHTML = `
            ${u.username}
            <button onclick="renameUser(${u.id})">✏️</button>
            <button onclick="deleteUser(${u.id})">❌</button>
        `;

                list.appendChild(li);
            });
        }

        async function renameUser(id) {

            const newName = prompt("New username:");
            if (!newName) return;

            const res = await fetch("/admin/rename", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    id: id,
                    new_username: newName
                })
            });

            const data = await res.json();

            console.log(data);

            await loadApproved();
        }

        async function deleteUser(id) {

            const res = await fetch("/admin/delete", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    id: id
                })
            });

            const data = await res.json();

            console.log(data);

            await loadApproved();
        }

        window.onload = () => {

            document.getElementById("admin_content").style.display = "none";

            setInterval(async () => {

                const content = document.getElementById("admin_content");

                // uniquement si admin connecté
                if (content.style.display === "block") {

                    await loadPending();
                    await loadApproved();

                    console.log("Admin panel updated");
                }

            }, 3000); // toutes les 3 secondes
        };
    </script>

</body>

</html>
