<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
</head>
<body>

<h1>Admin Panel</h1>

<input id="admin_pass" type="password" placeholder="Admin password">
<button onclick="loginAdmin()">Login</button>

<hr>

<h2>Pending users</h2>
<ul id="list"></ul>

<script>
async function loginAdmin() {
    const password = document.getElementById("admin_pass").value;

    const res = await fetch("/admin/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({password})
    });

    const data = await res.json();
    alert(data.message || data.error);

    if (res.ok) loadPending();
}

async function loadPending() {
    const res = await fetch("/admin/pending");
    const users = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    users.forEach(u => {
        const li = document.createElement("li");

        li.innerHTML = `
            ${u}
            <button onclick="approve('${u}')">✔</button>
            <button onclick="reject('${u}')">❌</button>
        `;

        list.appendChild(li);
    });
}

async function approve(username) {
    await fetch("/admin/approve", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({username})
    });

    loadPending();
}

async function reject(username) {
    await fetch("/admin/reject", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({username})
    });

    loadPending();
}
</script>

</body>
</html>
