<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>EDT Partagé</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css' rel='stylesheet'>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>
</head>

<body>

    <div class="topbar">
        <button class="setting_btn" id="setting_btn" style="display:none">Setting ⚙️</button>
        <button class="signin_btn" id="signin_btn">Sign in</button>
        <button class="login_btn" id="login_btn">Login</button>
    </div>

    <div class="page">
        <h1 class="title">Emploi Du Temps Partagé</h1>
    </div>

    <div id="calendar"></div>


    <!-- POPUP AUTH -->
    <div id="auth_modal" class="modal hidden">

        <div class="modal_content">

            <h2 id="modal_title">Login</h2>

            <input id="auth_user" class="auth_user" placeholder="username">
            <input id="auth_pass" class="auth_pass" type="password" placeholder="password">

            <button id="auth_submit" class="auth_submit">Submit</button>

            <button onclick="closeModal()" class="close_btn">Close</button>

        </div>

    </div>

    <!-- POPUP EVENT -->
    <div id="event_modal" class="modal hidden">
        <div class="modal_content">

            <h2>Créer / Modifier un événement</h2>

            <input id="event_title" class="event_title" placeholder="Nom de l'événement">

            <input id="event_date" class="event_date" type="date">

            <div>
                <h4>Début</h4>
                <input id="start_hour" type="number" min="0" max="23">
                <input id="start_minute" type="number" min="0" max="59">
            </div>

            <div>
                <h4>Fin</h4>
                <input id="end_hour" type="number" min="0" max="23">
                <input id="end_minute" type="number" min="0" max="59">
            </div>

            <button id="event_submit">Créer</button>
            <button onclick="closeEventModal()">Annuler</button>
            <button id="event_delete" style="display:none;">Supprimer</button>

        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
